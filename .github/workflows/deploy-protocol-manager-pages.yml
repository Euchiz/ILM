name: Deploy ILM Apps to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Account (home) for Pages
        run: npm run build -w @ilm/account
        env:
          VITE_BASE_PATH: /ILM/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Protocol Manager for Pages
        run: npm run build -w @ilm/protocol-manager
        env:
          VITE_BASE_PATH: /ILM/protocol-manager/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Project Manager for Pages
        run: npm run build -w @ilm/project-manager
        env:
          VITE_BASE_PATH: /ILM/project-manager/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Supply Manager for Pages
        run: npm run build -w @ilm/supply-manager
        env:
          VITE_BASE_PATH: /ILM/supply-manager/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Funding Manager for Pages
        run: npm run build -w @ilm/funding-manager
        env:
          VITE_BASE_PATH: /ILM/funding-manager/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Data Hub for Pages
        run: npm run build -w @ilm/data-hub
        env:
          VITE_BASE_PATH: /ILM/data-hub/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Scheduler for Pages
        run: npm run build -w @ilm/scheduler
        env:
          VITE_BASE_PATH: /ILM/scheduler/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Assemble Pages artifact
        run: |
          rm -rf .pages-dist
          mkdir -p .pages-dist/protocol-manager .pages-dist/project-manager .pages-dist/supply-manager .pages-dist/funding-manager .pages-dist/data-hub .pages-dist/scheduler
          cp -R apps/account/dist/. .pages-dist/
          cp -R apps/protocol-manager/dist/. .pages-dist/protocol-manager/
          cp -R apps/project-manager/dist/. .pages-dist/project-manager/
          cp -R apps/supply-manager/dist/. .pages-dist/supply-manager/
          cp -R apps/funding-manager/dist/. .pages-dist/funding-manager/
          cp -R apps/data-hub/dist/. .pages-dist/data-hub/
          cp -R apps/scheduler/dist/. .pages-dist/scheduler/
          # SPA fallback: GitHub Pages serves /<site>/404.html for any missing
          # path under the site. The Account shell now lives at the site root
          # and owns client-side routes (`/join/<uuid>`, `#/team`, ...), so
          # 404.html is the same shell. Assets resolve against its base /ILM/.
          cp .pages-dist/index.html .pages-dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
