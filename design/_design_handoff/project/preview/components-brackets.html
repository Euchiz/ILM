<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Brackets</title></head>
<body>
<div class="card">
  <div class="label-tight">Linework — corner brackets</div>
  <div style="position:relative;display:inline-block;padding:14px 22px;background:#fff;font-family:var(--vbl-font-display);font-size:0.82rem;font-weight:600;color:var(--vbl-ink);">
    <span style="position:absolute;top:-1px;left:-1px;width:12px;height:12px;border:2px solid var(--vbl-ink);border-right:none;border-bottom:none;"></span>
    INTEGRATED LAB
    <span style="position:absolute;right:-1px;bottom:-1px;width:12px;height:12px;border:2px solid var(--vbl-ink);border-left:none;border-top:none;"></span>
  </div>
  <div class="token">.vbl-brackets — used on data labels</div>
</div>
</body></html>
