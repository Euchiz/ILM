<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Accent colors</title></head>
<body>
<div class="card">
  <div class="label-tight">Accent — Blue & Mint</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;">
    <div class="row"><div class="swatch" style="background:#5c7d8f"></div><div class="swatch-label"><span class="name">Blue</span><span class="hex">#5C7D8F · --vbl-blue</span></div></div>
    <div class="row"><div class="swatch" style="background:#dcecf3"></div><div class="swatch-label"><span class="name">Blue Soft</span><span class="hex">#DCECF3 · --vbl-blue-soft</span></div></div>
    <div class="row"><div class="swatch" style="background:#c9eee2"></div><div class="swatch-label"><span class="name">Mint</span><span class="hex">#C9EEE2 · --vbl-mint</span></div></div>
    <div class="row"><div class="swatch" style="background:#a8d6ca"></div><div class="swatch-label"><span class="name">Mint Dim</span><span class="hex">#A8D6CA · --vbl-mint-dim</span></div></div>
  </div>
</div>
</body></html>
