<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Status colors</title></head>
<body>
<div class="card">
  <div class="label-tight">Status — Amber & Red</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;">
    <div class="row"><div class="swatch" style="background:#9a5b1e"></div><div class="swatch-label"><span class="name">Amber</span><span class="hex">#9A5B1E review</span></div></div>
    <div class="row"><div class="swatch" style="background:#fff2df"></div><div class="swatch-label"><span class="name">Amber Soft</span><span class="hex">#FFF2DF</span></div></div>
    <div class="row"><div class="swatch" style="background:#b42318"></div><div class="swatch-label"><span class="name">Red</span><span class="hex">#B42318 error</span></div></div>
    <div class="row"><div class="swatch" style="background:#ffded8"></div><div class="swatch-label"><span class="name">Red Soft</span><span class="hex">#FFDED8</span></div></div>
    <div class="row"><div class="swatch" style="background:#2f7d72"></div><div class="swatch-label"><span class="name">Success</span><span class="hex">#2F7D72 = viridian</span></div></div>
  </div>
</div>
</body></html>
