<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons</title></head>
<body>
<div class="card">
  <div class="label-tight">Buttons</div>
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    <button style="appearance:none;border:1px solid var(--vbl-viridian);background:var(--vbl-viridian);color:#fff;padding:0.55rem 1rem;border-radius:8px;font-family:var(--vbl-font-display);font-weight:600;font-size:0.82rem;letter-spacing:0.04em;cursor:pointer;">Publish</button>
    <button style="appearance:none;border:1px solid var(--vbl-outline);background:transparent;color:var(--vbl-ink);padding:0.55rem 1rem;border-radius:8px;font-family:var(--vbl-font-display);font-weight:600;font-size:0.82rem;letter-spacing:0.04em;cursor:pointer;">Submit for review</button>
    <button style="appearance:none;border:1px solid transparent;background:transparent;color:var(--vbl-ink);padding:0.55rem 1rem;border-radius:8px;font-family:var(--vbl-font-display);font-weight:600;font-size:0.82rem;cursor:pointer;">Cancel</button>
    <button style="appearance:none;border:1px solid #f2b3af;background:#fff;color:var(--vbl-red);padding:0.55rem 1rem;border-radius:8px;font-family:var(--vbl-font-display);font-weight:600;font-size:0.82rem;cursor:pointer;">Delete</button>
    <button style="appearance:none;border:1px solid var(--vbl-ink);background:var(--vbl-ink);color:#fff;padding:0.55rem 1rem;border-radius:8px;font-family:var(--vbl-font-display);font-weight:600;font-size:0.82rem;cursor:pointer;">Approve</button>
  </div>
  <div class="token">primary · secondary · ghost · danger · ink</div>
</div>
</body></html>
