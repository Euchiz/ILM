<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Shadows</title></head>
<body>
<div class="card">
  <div class="label-tight">Shadows — luminous, viridian-tinted</div>
  <div class="row" style="gap:18px;padding:8px 0 18px;">
    <div style="width:80px;height:60px;background:#fff;border:1px solid var(--vbl-line);border-radius:8px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);"></div>
    <div style="width:80px;height:60px;background:#fff;border:1px solid var(--vbl-line);border-radius:8px;box-shadow:0 0 18px rgba(78,159,146,0.08);"></div>
    <div style="width:80px;height:60px;background:#fff;border:1px solid var(--vbl-line);border-radius:8px;box-shadow:0 14px 34px rgba(40,69,65,0.08);"></div>
    <div style="width:80px;height:60px;background:#fff;border:1px solid var(--vbl-line);border-radius:8px;box-shadow:0 18px 48px rgba(59,99,91,0.13);"></div>
    <div style="width:80px;height:60px;background:var(--vbl-viridian);border-radius:8px;box-shadow:0 0 12px rgba(78,159,146,0.34);"></div>
  </div>
  <div class="row" style="gap:18px;font-size:0.66rem;font-family:var(--vbl-font-display);color:var(--vbl-fg-3);">
    <div style="width:80px;text-align:center;">inner light</div>
    <div style="width:80px;text-align:center;">step bloom</div>
    <div style="width:80px;text-align:center;">soft</div>
    <div style="width:80px;text-align:center;">ambient</div>
    <div style="width:80px;text-align:center;">glow</div>
  </div>
</div>
</body></html>
