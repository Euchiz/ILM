<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Status pills</title></head>
<body>
<div class="card">
  <div class="label-tight">Status pills — workflow</div>
  <div class="row" style="gap:8px;flex-wrap:wrap;">
    <span style="display:inline-flex;padding:0.22rem 0.6rem;border-radius:999px;font-family:var(--vbl-font-display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;background:#fbf2e4;color:#8a4900;border:1px solid #d7bca1;">Draft</span>
    <span style="display:inline-flex;padding:0.22rem 0.6rem;border-radius:999px;font-family:var(--vbl-font-display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;background:#f8edcf;color:#7c5c16;border:1px solid #e7d39a;">Submitted</span>
    <span style="display:inline-flex;padding:0.22rem 0.6rem;border-radius:999px;font-family:var(--vbl-font-display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;background:#dfeaf7;color:#335983;border:1px solid #b5cbe7;">Reviewed</span>
    <span style="display:inline-flex;padding:0.22rem 0.6rem;border-radius:999px;font-family:var(--vbl-font-display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;background:#dff1ec;color:#2f7d72;border:1px solid rgba(55,86,59,0.2);">Published</span>
    <span style="display:inline-flex;padding:0.22rem 0.6rem;border-radius:999px;font-family:var(--vbl-font-display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;background:#e2efe1;color:#24533c;border:1px solid #b6d1b4;">Active</span>
    <span style="display:inline-flex;padding:0.22rem 0.6rem;border-radius:999px;font-family:var(--vbl-font-display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;background:#ffded8;color:#8f170f;border:1px solid #f2b3af;">Rejected</span>
    <span style="display:inline-flex;padding:0.22rem 0.6rem;border-radius:999px;font-family:var(--vbl-font-display);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;background:#efe6db;color:#74563f;border:1px solid #d7bfa7;">Archived</span>
  </div>
</div>
</body></html>
