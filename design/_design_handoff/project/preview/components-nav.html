<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Nav</title></head>
<body>
<div class="card" style="background:rgba(249,250,248,0.85);">
  <div class="label-tight">Sidebar nav — bordered letter glyphs</div>
  <div class="col" style="gap:4px;">
    <div style="display:grid;grid-template-columns:26px 1fr auto;gap:0.5rem;padding:0.55rem 0.7rem;border:1px solid var(--vbl-line);border-radius:8px;background:rgba(255,255,255,0.95);color:var(--vbl-viridian);font-family:var(--vbl-font-display);font-size:0.78rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;align-items:center;box-shadow:0 12px 22px rgba(30,46,30,0.05);">
      <span style="display:inline-grid;place-items:center;width:22px;height:22px;border:1.5px solid currentColor;border-radius:4px;font-size:0.7rem;">O</span>
      <span>Overview</span><span style="width:6px;height:6px;border-radius:50%;background:currentColor;"></span>
    </div>
    <div style="display:grid;grid-template-columns:26px 1fr auto;gap:0.5rem;padding:0.55rem 0.7rem;border:1px solid transparent;border-radius:8px;color:var(--vbl-ink);font-family:var(--vbl-font-display);font-size:0.78rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;align-items:center;">
      <span style="display:inline-grid;place-items:center;width:22px;height:22px;border:1.5px solid currentColor;border-radius:4px;font-size:0.7rem;">P</span>
      <span>Projects</span><span></span>
    </div>
    <div style="display:grid;grid-template-columns:26px 1fr auto;gap:0.5rem;padding:0.55rem 0.7rem;border:1px solid transparent;border-radius:8px;color:var(--vbl-fg-3);font-family:var(--vbl-font-display);font-size:0.78rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;align-items:center;">
      <span style="display:inline-grid;place-items:center;width:22px;height:22px;border:1.5px solid currentColor;border-radius:4px;font-size:0.7rem;">F</span>
      <span>Funding</span><span style="font-size:0.55rem;letter-spacing:0.15em;background:var(--vbl-surface-soft);color:var(--vbl-fg-3);padding:0.1rem 0.35rem;border-radius:999px;border:1px solid var(--vbl-hairline);">SOON</span>
    </div>
  </div>
</div>
</body></html>
