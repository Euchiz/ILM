<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Neutrals</title></head>
<body>
<div class="card">
  <div class="label-tight">Neutrals — Surface & Ink</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;">
    <div class="row"><div class="swatch" style="background:#f7f9f7"></div><div class="swatch-label"><span class="name">Canvas</span><span class="hex">#F7F9F7</span></div></div>
    <div class="row"><div class="swatch" style="background:#ffffff"></div><div class="swatch-label"><span class="name">Surface</span><span class="hex">#FFFFFF</span></div></div>

    <div class="row"><div class="swatch" style="background:#d9e3df"></div><div class="swatch-label"><span class="name">Line</span><span class="hex">#D9E3DF</span></div></div>
    <div class="row"><div class="swatch" style="background:#60716e"></div><div class="swatch-label"><span class="name">Muted</span><span class="hex">#60716E</span></div></div>
    <div class="row"><div class="swatch" style="background:#14201f"></div><div class="swatch-label"><span class="name">Ink</span><span class="hex">#14201F</span></div></div>
  </div>
</div>
</body></html>
