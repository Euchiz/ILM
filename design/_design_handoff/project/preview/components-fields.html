<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Form fields</title></head>
<body>
<div class="card">
  <div class="label-tight">Form fields</div>
  <div class="col" style="gap:10px;max-width:420px;">
    <label class="col" style="gap:4px;"><span style="font-family:var(--vbl-font-display);font-size:0.78rem;color:var(--vbl-fg-2);font-weight:500;">Lab name</span><input type="text" value="Rhine Lab" style="padding:0.55rem 0.75rem;border:1px solid var(--vbl-line);border-radius:8px;background:#fff;color:var(--vbl-ink);font-family:var(--vbl-font-body);font-size:0.9rem;"></label>
    <label class="col" style="gap:4px;"><span style="font-family:var(--vbl-font-display);font-size:0.78rem;color:var(--vbl-fg-2);font-weight:500;">Description</span><textarea style="padding:0.55rem 0.75rem;border:1px solid var(--vbl-line);border-radius:8px;background:#fff;color:var(--vbl-ink);font-family:var(--vbl-font-body);font-size:0.9rem;min-height:3rem;">Computational biology, sequencing, and CRISPR work.</textarea></label>
  </div>
</div>
</body></html>
