<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing scale</title></head>
<body>
<div class="card">
  <div class="label-tight">Spacing — 4px grid</div>
  <div style="display:flex;align-items:flex-end;gap:6px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:4px;height:4px;background:var(--vbl-viridian);"></div><span class="token">4</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:8px;height:8px;background:var(--vbl-viridian);"></div><span class="token">8</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:12px;height:12px;background:var(--vbl-viridian);"></div><span class="token">12</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:16px;height:16px;background:var(--vbl-viridian);"></div><span class="token">16</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:24px;height:24px;background:var(--vbl-viridian);"></div><span class="token">24</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:32px;background:var(--vbl-viridian);"></div><span class="token">32</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:48px;height:48px;background:var(--vbl-viridian);"></div><span class="token">48</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:64px;height:64px;background:var(--vbl-viridian);"></div><span class="token">64</span></div>
  </div>
</div>
</body></html>
